<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Grid Buddy</title>
  
  <!-- Load Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Load React and ReactDOM -->
  <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
  
  <!-- Load Babel to translate JSX into browser-readable JavaScript -->
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;

    // --- Inline Icons (Replacing lucide-react) ---
    const UploadIcon = ({ size = 24 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
    );
    const RefreshCwIcon = ({ size = 24 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/><path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/></svg>
    );
    const ChevronRightIcon = ({ size = 24 }) => (
      <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
    );

    /**
     * Helper to load external scripts dynamically for Masonry and html2canvas
     */
    const loadScript = (src) => {
      return new Promise((resolve, reject) => {
        const script = document.createElement('script');
        script.src = src;
        script.onload = resolve;
        script.onerror = reject;
        document.head.appendChild(script);
      });
    };

    // --- GOV.UK Design System Style Tokens ---
    const GDS_COLORS = {
      blue: "#4442e3", 
      black: "#0b0c0c",
      grey1: "#b1b4b6",
      grey3: "#f3f2f1",
      white: "#ffffff",
      primary: "#4442e3",
      yellow: "#ffdd00",
      text: "#0b0c0c",
      workspace: "#e6e6e6",
      darkGrey: "#505a5f"
    };

    // --- GDS UI Components ---
    const GdsLabel = ({ children }) => (
      <label className="block text-sm font-bold mb-0.5" style={{ color: GDS_COLORS.black }}>
        {children}
      </label>
    );

    const GdsHint = ({ children }) => (
      <span className="block text-xs mb-1" style={{ color: "#505a5f" }}>
        {children}
      </span>
    );

    const GdsInput = ({ ...props }) => (
      <input 
        {...props} 
        className="h-9 w-full border-2 border-black px-2 text-base focus:outline-none focus:ring-4 focus:ring-[#ffb60c]"
        style={{ borderColor: GDS_COLORS.black }}
      />
    );

    const GdsButton = ({ children, variant = "primary", className = "", ...props }) => {
      const styles = {
        primary: {
          backgroundColor: GDS_COLORS.primary,
          color: 'white',
          boxShadow: '0 2px 0 #1a1a5e',
        },
        secondary: {
          backgroundColor: '#f3f2f1',
          color: '#0b0c0c',
          boxShadow: '0 2px 0 #b1b4b6',
        }
      };

      return (
        <button 
          {...props} 
          className={`px-4 py-2 font-bold text-base inline-flex items-center justify-center gap-2 active:top-[2px] active:shadow-none relative transition-all ${className}`}
          style={styles[variant]}
        >
          {children}
          {variant === "primary" && <ChevronRightIcon size={18} />}
        </button>
      );
    };

    const GdsSection = ({ title, children, hasDivider = true, className = "" }) => (
      <div className={`mb-6 pb-4 ${hasDivider ? 'border-b border-gray-200' : ''} ${className}`}>
        <h2 className="text-base font-bold mb-2 uppercase tracking-wide" style={{ color: GDS_COLORS.black }}>{title}</h2>
        {children}
      </div>
    );

    // --- Main App Component ---
    function App() {
      const [libsLoaded, setLibsLoaded] = useState(false);

      // State
      const [photos, setPhotos] = useState([]); 
      const [cols, setCols] = useState(3);
      const [gap, setGap] = useState(10);
      const [radius, setRadius] = useState(0); 
      const [zoom, setZoom] = useState(130);
      const [rotation, setRotation] = useState(20);
      const [borderColor, setBorderColor] = useState('#4442e3'); 
      const [bgColor, setBgColor] = useState('#ffffff');
      const [isExporting, setIsExporting] = useState(false);
      
      // Pan state
      const [pan, setPan] = useState({ x: 0, y: 0 });
      const [isDragging, setIsDragging] = useState(false);
      const dragStart = useRef({ x: 0, y: 0 });

      // Refs
      const gridRef = useRef(null);
      const masonryInstance = useRef(null);
      const captureAreaRef = useRef(null);
      const workspaceRef = useRef(null);

      const [previewScale, setPreviewScale] = useState(0.55);

      const BASE_WIDTH = 1000;

      // Load external scripts
      useEffect(() => {
        const initLibs = async () => {
          try {
            await Promise.all([
              loadScript('https://unpkg.com/masonry-layout@4/dist/masonry.pkgd.min.js'),
              loadScript('https://unpkg.com/imagesloaded@5/imagesloaded.pkgd.min.js'),
              loadScript('https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js')
            ]);
            setLibsLoaded(true);
          } catch (err) {
            console.error("Failed to load libraries", err);
          }
        };
        initLibs();
      }, []);

      // Initialize and Update Masonry
      useEffect(() => {
        if (libsLoaded && gridRef.current) {
            window.imagesLoaded(gridRef.current, () => {
              if (!masonryInstance.current) {
                masonryInstance.current = new window.Masonry(gridRef.current, {
                  itemSelector: '.grid-item',
                  columnWidth: '.grid-item',
                  percentPosition: false,
                  transitionDuration: '0.4s',
                  gutter: gap
                });
              } else {
                masonryInstance.current.options.gutter = gap;
                masonryInstance.current.reloadItems();
                masonryInstance.current.layout();
              }
            });
        }
      }, [libsLoaded, photos, gap, cols]);

      // Handle Dragging
      useEffect(() => {
        const handleMouseMove = (e) => {
          if (!isDragging) return;
          setPan({ x: e.clientX - dragStart.current.x, y: e.clientY - dragStart.current.y });
        };
        const handleMouseUp = () => setIsDragging(false);

        if (isDragging) {
          window.addEventListener('mousemove', handleMouseMove);
          window.addEventListener('mouseup', handleMouseUp);
        }
        return () => {
          window.removeEventListener('mousemove', handleMouseMove);
          window.removeEventListener('mouseup', handleMouseUp);
        };
      }, [isDragging]);

      // Responsive preview scaling
      useEffect(() => {
        const updateScale = () => {
          if (workspaceRef.current) {
            const { clientWidth, clientHeight } = workspaceRef.current;
            const padding = 160; // Increased padding to make the frame appear slightly smaller
            
            // Calculate scale to fit the 1280x720 canvas
            const scaleX = (clientWidth - padding) / 1280;
            const scaleY = (clientHeight - padding) / 720;
            const newScale = Math.min(scaleX, scaleY);
            
            // Cap scale at 1.2x to prevent it getting excessively large on massive monitors
            setPreviewScale(Math.min(newScale, 1.2));
          }
        };

        if (libsLoaded) {
          // Run initially once the UI is actually rendered (slight delay ensures layout is finished)
          setTimeout(updateScale, 50);
        }
        
        window.addEventListener('resize', updateScale);
        return () => window.removeEventListener('resize', updateScale);
      }, [libsLoaded]);

      const handleUpload = (e) => {
        const files = Array.from(e.target.files);
        const urls = files.map(file => URL.createObjectURL(file));
        setPhotos(prev => [...prev, ...urls]);
        e.target.value = null;
      };

      const handleExport = async () => {
        if (!captureAreaRef.current || !window.html2canvas) return;
        setIsExporting(true);
        
        // --- FIX: Temporarily remove the preview scale from the actual DOM ---
        // html2canvas relies on accurate bounding client rects. When the parent is scaled,
        // the rect is smaller, leading to cropped/distorted exports depending on window size.
        const parentElement = captureAreaRef.current.parentElement;
        const originalTransform = parentElement.style.transform;
        parentElement.style.transform = 'scale(1)';

        // Wait a brief moment for the DOM to update its bounding boxes before capturing
        await new Promise(resolve => setTimeout(resolve, 50));

        try {
          const canvas = await window.html2canvas(captureAreaRef.current, {
            useCORS: true,
            scale: 3, // Multiplies the 1280x720 resolution by 3 for a high-quality export
            backgroundColor: bgColor,
            width: 1280,
            height: 720,
            onclone: (doc) => {
              const mask = doc.getElementById('bleed-mask-node');
              if (mask) mask.style.display = 'none';
            }
          });

          const link = document.createElement('a');
          link.download = `grid-buddy-export.png`;
          link.href = canvas.toDataURL('image/png');
          link.click();
        } catch (err) {
          console.error("Export Error:", err);
        } finally {
          // Snap the scale back to normal once the capture is complete
          parentElement.style.transform = originalTransform;
          setIsExporting(false);
        }
      };

      const itemWidth = (BASE_WIDTH - (gap * (cols - 1))) / cols;

      if (!libsLoaded) {
        return (
          <div className="flex items-center justify-center min-h-screen bg-[#e6e6e6]">
            <p className="text-lg font-bold">Loading components...</p>
          </div>
        );
      }

      return (
        <div className="bg-[#f9f9fb] h-screen flex overflow-hidden text-[#0b0c0c] font-sans">
          
          {/* Workspace Area */}
          <main 
            ref={workspaceRef}
            className="flex-grow bg-[#e6e6e6] flex items-center justify-center relative overflow-hidden border-r border-gray-300"
          >
            <div style={{ transform: `scale(${previewScale})`, transformOrigin: 'center' }}>
              <div 
                id="capture-area-node"
                ref={captureAreaRef}
                onMouseDown={(e) => {
                  if (e.button !== 0) return;
                  setIsDragging(true);
                  dragStart.current = { x: e.clientX - pan.x, y: e.clientY - pan.y };
                }}
                style={{ 
                  backgroundColor: bgColor,
                  width: '1280px',
                  height: '720px',
                  position: 'relative',
                  overflow: 'visible',
                  cursor: isDragging ? 'grabbing' : 'grab',
                  boxShadow: '0 10px 40px rgba(0,0,0,0.1)'
                }}
              >
                <div style={{ 
                  transform: `translate(${pan.x}px, ${pan.y}px) rotate(${rotation}deg)`,
                  display: 'inline-block'
                }}>
                  <div style={{ transform: `scale(${zoom / 100})`, transformOrigin: 'center center' }}>
                    <div ref={gridRef} className="grid" style={{ width: `${BASE_WIDTH}px` }}>
                      {photos.map((src, i) => (
                        <div key={i} className="grid-item" style={{ width: `${itemWidth}px`, marginBottom: `${gap}px` }}>
                          <div className="bg-white" style={{ borderRadius: `${radius}px`, border: `2px solid ${borderColor}`, overflow: 'hidden' }}>
                            <img src={src} alt="" className="w-full block pointer-events-none" />
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                </div>

                {/* Thinner Viewport Guide (2px) */}
                <div id="bleed-mask-node" className="absolute inset-0 pointer-events-none" style={{ boxShadow: '0 0 0 10000px rgba(230, 230, 230, 0.85)', border: '2px solid #505a5f', zIndex: 50 }}>
                </div>
              </div>
            </div>
          </main>

          {/* Wider Sidebar (400px) */}
          <aside className="w-[400px] bg-white overflow-y-auto p-8 flex flex-col shrink-0 border-l border-gray-200 shadow-2xl z-20">
            <h1 className="text-3xl font-bold mb-1 tracking-tight">Grid Buddy</h1>
            <p className="text-xs text-gray-500 mb-8 leading-relaxed">Create custom masonry grids for your presentation</p>

            <GdsSection title="1. Add files">
              <GdsHint>JPG or PNG images.</GdsHint>
              <GdsButton variant="secondary" onClick={() => document.getElementById('up').click()} className="w-full">
                <UploadIcon size={16} /> Choose files
              </GdsButton>
              <input type="file" id="up" multiple accept=".png, .jpg, .jpeg" onChange={handleUpload} className="hidden" />
            </GdsSection>

            <GdsSection title="2. Grid layout">
              <div className="grid grid-cols-2 gap-4 mb-3">
                <div><GdsLabel>Columns</GdsLabel><GdsInput type="number" value={cols} onChange={(e) => setCols(parseInt(e.target.value) || 1)} /></div>
                <div><GdsLabel>Gap (px)</GdsLabel><GdsInput type="number" value={gap} onChange={(e) => setGap(parseInt(e.target.value) || 0)} /></div>
              </div>
              <GdsLabel>Border radius</GdsLabel>
              <GdsInput type="number" value={radius} onChange={(e) => setRadius(parseInt(e.target.value) || 0)} />
            </GdsSection>

            <GdsSection title="3. Adjust viewport">
              <div className="grid grid-cols-2 gap-4">
                <div><GdsLabel>Zoom %</GdsLabel><GdsInput type="number" value={zoom} onChange={(e) => setZoom(parseInt(e.target.value) || 1)} /></div>
                <div><GdsLabel>Rotation</GdsLabel><GdsInput type="number" value={rotation} onChange={(e) => setRotation(parseInt(e.target.value) || 0)} /></div>
              </div>
            </GdsSection>

            {/* Compact Appearance Section */}
            <GdsSection title="4. Appearance" hasDivider={false} className="mb-12">
              <div className="space-y-2">
                <div className="flex justify-between items-center py-1 px-3 border-l-4 border-black" style={{ backgroundColor: GDS_COLORS.grey3 }}>
                  <GdsLabel>Border color</GdsLabel>
                  <input type="color" value={borderColor} onChange={(e) => setBorderColor(e.target.value)} className="w-8 h-8 cursor-pointer" />
                </div>
                <div className="flex justify-between items-center py-1 px-3 border-l-4 border-black" style={{ backgroundColor: GDS_COLORS.grey3 }}>
                  <GdsLabel>Canvas background</GdsLabel>
                  <input type="color" value={bgColor} onChange={(e) => setBgColor(e.target.value)} className="w-8 h-8 cursor-pointer" />
                </div>
              </div>
            </GdsSection>

            {/* Action Area */}
            <div className="mt-auto pt-6 border-t border-gray-200">
              <GdsButton 
                variant="primary" 
                onClick={handleExport} 
                disabled={isExporting || photos.length === 0} 
                className="w-full mb-3 h-12"
              >
                {isExporting ? 'Exporting...' : 'Export Image'}
              </GdsButton>
              
              <button 
                onClick={() => window.location.reload()} 
                className="text-sm font-bold underline text-[#1d70b8] hover:text-[#003078] flex items-center gap-1"
              >
                <RefreshCwIcon size={14} /> Clear settings
              </button>
            </div>
          </aside>
        </div>
      );
    }

    // --- Render the App ---
    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
